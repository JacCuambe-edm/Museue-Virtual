<VirtualHost *:8080>
    ServerName museu.edm.co.mz

    DocumentRoot /var/www/museu/dist

    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:5050/api/
    ProxyPassReverse /api/ http://127.0.0.1:5050/api/

    ProxyPass /uploads/ http://127.0.0.1:5050/uploads/
    ProxyPassReverse /uploads/ http://127.0.0.1:5050/uploads/

    <Directory /var/www/museu/dist>
        AllowOverride All
        Require all granted
        Options -Indexes

        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteCond %{REQUEST_URI} !^/uploads/
        RewriteRule ^ /index.html [L]
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    <FilesMatch "\.(js|css|png|jpg|jpeg|avif|webp|svg|ico|woff2?)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <FilesMatch "^index\.html$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/museu_error.log
    CustomLog ${APACHE_LOG_DIR}/museu_access.log combined
</VirtualHost>
