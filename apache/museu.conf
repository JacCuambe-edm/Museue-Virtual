<VirtualHost *:80>
    ServerName museu.edm.co.mz
    ServerAlias www.museu.edm.co.mz

    DocumentRoot /var/www/museu/dist

    # Activar módulos necessários (garantir que estão activos: mod_proxy, mod_rewrite)
    # sudo a2enmod proxy proxy_http rewrite headers

    # Proxy para a API Node.js (porta 5050)
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:5050/api/
    ProxyPassReverse /api/ http://127.0.0.1:5050/api/

    # Proxy para ficheiros carregados pelo admin
    ProxyPass /uploads/ http://127.0.0.1:5050/uploads/
    ProxyPassReverse /uploads/ http://127.0.0.1:5050/uploads/

    <Directory /var/www/museu/dist>
        AllowOverride All
        Require all granted
        Options -Indexes

        # SPA fallback: rota qualquer pedido sem ficheiro para index.html
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        # Não redirecionar /api/ e /uploads/ — já são proxied acima
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteCond %{REQUEST_URI} !^/uploads/
        RewriteRule ^ /index.html [L]
    </Directory>

    # Cabeçalhos de segurança
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Cache para assets estáticos (JS/CSS/imagens)
    <FilesMatch "\.(js|css|png|jpg|jpeg|avif|webp|svg|ico|woff2?)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    # Sem cache para index.html (SPA entry point)
    <FilesMatch "^index\.html$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/museu_error.log
    CustomLog ${APACHE_LOG_DIR}/museu_access.log combined
</VirtualHost>
