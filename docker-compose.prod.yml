version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: museu-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-edm2022}
      MYSQL_DATABASE: ${DB_NAME:-museu_edm_final}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-edm2022}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: ['--default-authentication-plugin=mysql_native_password']

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: museu-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-edm2022}
      DB_NAME: ${DB_NAME:-museu_edm_final}
      DB_PORT: 3306
      JWT_SECRET: ${JWT_SECRET:-museu_edm_secret_key_2025_change_in_production}
      PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: museu-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
volumes:
  db_data:
